name: Maricopa Motivated Seller Scraper

on:
  schedule:
    - cron: '0 15 * * *'   # 8 AM Arizona time daily
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            libtesseract-dev \
            poppler-utils \
            libgl1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python fetch.py
        env:
          LOOKBACK_DAYS: 7

      - name: Commit data files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/
          git diff --staged --quiet || git commit -m "Scraper run: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true

      - name: Upload Excel as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: leads-${{ github.run_id }}
          path: data/leads.xlsx
          retention-days: 30

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo (with latest data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
