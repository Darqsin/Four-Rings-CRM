name: Scrape Maricopa Motivated Seller Leads

on:
  schedule:
    - cron: "0 7 * * *"    # 7 AM UTC = midnight AZ (MST) / 12 AM AZ (MDT)
  workflow_dispatch:         # manual trigger from GitHub Actions UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── System deps for OCR (Tesseract + Poppler) ─────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-eng \
            poppler-utils \
            libgl1-mesa-glx \
            libglib2.0-0

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests beautifulsoup4 lxml \
            playwright \
            dbfread \
            pdfplumber "pdfminer.six" \
            PyMuPDF pytesseract Pillow \
            openpyxl

      # ── Playwright browser ────────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ── Run scraper ───────────────────────────────────────────────────────
      - name: Run scraper
        env:
          LOOKBACK_DAYS: "7"
        run: python scraper/fetch.py

      # ── Commit outputs ────────────────────────────────────────────────────
      - name: Commit output files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            dashboard/records.json \
            data/records.json \
            data/ghl_export.csv \
            data/leads.xlsx \
            || true
          git diff --cached --quiet || \
            git commit -m "chore: update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── Deploy dashboard to GitHub Pages ──────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
