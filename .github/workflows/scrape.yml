name: Maricopa Motivated Seller Scraper

on:
  schedule:
    # Runs daily at 8:00 AM Arizona time (MST = UTC-7, so 15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:   # also allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit data files back to repo
  pages: write         # needed to deploy dashboard to GitHub Pages
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            libtesseract-dev \
            poppler-utils \
            libgl1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: |
          python fetch.py
        env:
          LOOKBACK_DAYS: 7

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/
          git diff --staged --quiet || git commit -m "Scraper run: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true   # don't fail the job if nothing changed

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: leads-${{ github.run_id }}
          path: data/leads.xlsx
          retention-days: 30

      - name: Deploy dashboard to GitHub Pages
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          artifact_name: dashboard
        continue-on-error: true
